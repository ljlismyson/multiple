# Paired diffraction-multiple attenuation.
# This variant processes each trace with a shared 1D U-Net and mixes traces
# with self-attention at the U-Net bottleneck.

experiment:
  name: diffraction_multiples_trace_attention_unet
  output_dir: outputs/260628_trace_v2
  seed: 42
  device: cuda

data:
  # null means all 704 training shots. If set, val shots are selected with
  # the same 8:1 train:val ratio, rounded to an integer.
  train_shots: 200

  train_pair:
    input_path: data/train/free_surface_ns704ng481nt3300.bin
    target_path: data/train/sim_abs_ghost_ns704ng481nt3300.bin
    shape: [704, 481, 3300]
    dtype: float32
    order: C
    mmap: false

  val_pair:
    input_path: data/val/free_surface_ns88ng481nt3300.bin
    target_path: data/val/sim_abs_ghost_ns88ng481nt3300.bin
    shape: [88, 481, 3300]
    dtype: float32
    order: C
    mmap: false

  test_pair:
    input_path: data/test/free_surface_ns88ng481nt3300.bin
    target_path: data/test/sim_abs_ghost_ns88ng481nt3300.bin
    shape: [88, 481, 3300]
    dtype: float32
    order: C
    mmap: false
    note: "Held out for final testing only; the training script does not load this split."

  loader:
    batch_size: 4
    num_workers: 0
    pin_memory: true

preprocess:
  dt: 0.002
  t0: 0.0
  normalize_mode: max_abs
  normalize_scope: global
  patch_time: 3300
  patch_trace: 128
  patch_overlap: 0.5
  # Only trace coordinate is appended: [seismic, trace_position].
  # Time is handled as the 1D U-Net convolution axis inside each trace.
  position_encoding_channels: trace
  position_encoding_range: minus_one_to_one
  max_shots: null

model:
  type: trace_attention_unet
  params:
    in_channels: 2
    out_channels: 1
    base_channels: 32
    depth: 4
    attention_heads: 4
    attention_dropout: 0.0
    ffn_multiplier: 2

loss:
  type: mse
  params:
    reduction: mean

metrics:
  - name: snr
    params: { reduction: per_sample }
  - name: psnr
    params: { data_range: 1.0, reduction: per_sample }
  - name: ssim
    params: { data_range: 2.0, window_size: 11, sigma: 1.5 }
  - name: mae
    params: {}
  - name: mse
    params: {}
  - name: rmse
    params: { reduction: per_sample }

optim:
  type: adamw
  params:
    lr: 1.0e-3
    weight_decay: 1.0e-4

scheduler:
  type: cosine
  params:
    min_lr: 1.0e-6

train:
  epochs: 400
  grad_clip: 1.0
  log_step: false
  log_interval: 10
  eval_interval: 1
  ckpt_interval: 20
  vis_interval: 9999
  resume: null

log:
  log_dir: logs
  plot_interval: 5

inference:
  split: test
  checkpoint: null
  output_dir: null
  device: cuda
  batch_size: 4
  max_shots: null
  n_viz_shots: 9999
  seed: 42
  save_npy: false
  save_bin: true
